<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Полный словарь промпт-инженера</title>
    <meta name="description" content="Интерактивный справочник по промпт-инженерии, LLM-системам, RAG, агентам, оценке качества и эксплуатации AI-продуктов.">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#0f1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="styles.css">
    <script>
        // Критический скрипт: применяем тему ДО рендера страницы.
        // Это предотвращает "вспышку" неправильного фона (FOUC).
        // Запускается синхронно в <head>, до парсинга <body>.
        (function() {
            try {
                if (window.Telegram?.WebApp) return; // Telegram управляет темой сам
                var saved = localStorage.getItem('theme');
                // По умолчанию — тёмная тема (если нет сохранённого значения)
                if (saved !== 'light') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    document.documentElement.style.colorScheme = 'dark';
                }
            } catch(e) {}
        })();
    </script>
    <script>
        // Инициализация Telegram WebApp
        if (window.Telegram?.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
        }
    </script>
</head>
<body>
    <button class="menu-toggle-btn" type="button" onclick="toggleSidebar()" aria-label="Открыть меню разделов">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <a href="#" class="sidebar-logo-link" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;">
                <img
                    id="sidebar-logo"
                    src="img/logo_dark.svg"
                    data-src-dark="img/logo_dark.svg"
                    data-src-light="img/logo_light.svg"
                    alt="Словарь промпт-инженера"
                    class="sidebar-logo"
                >
            </a>
        </div>
        <ul class="sidebar-menu" id="sidebar-menu"></ul>
    </aside>
    <div class="sidebar-backdrop" id="sidebar-backdrop" aria-hidden="true"></div>

    <main class="main-content">
        <div class="top-bar">
            <div class="search-box">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" class="search-input" id="search" placeholder="Быстрый поиск по термину или разделу..." oninput="handleSearch()" aria-label="Поиск термина или раздела">
            </div>
            <div class="top-actions">
                <a href="https://codebdbd.github.io/" target="_blank" rel="noopener noreferrer" class="support-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> Поддержать проект</a>
                <button class="theme-toggle" type="button" onclick="toggleTheme()">
                    <span id="theme-icon"><img src="img/light.svg" alt="Тема" width="20" height="20" style="vertical-align:middle;"></span> <span id="theme-text">Светлая тема</span>
                </button>
            </div>
        </div>

        <header class="header">
            <h1 id="dictionary-title">Полный словарь промпт-инженера</h1>
            <p id="dictionary-subtitle">Актуальное интерактивное руководство по ключевым концепциям LLM, архитектурам моделей, RAG, агентам и продвинутым техникам промптинга.</p>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-val" id="stat-total">0</div>
                    <div class="stat-lbl">Всего терминов</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="stat-basic" style="color: var(--badge-basic);">0</div>
                    <div class="stat-lbl">Базовые</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="stat-medium" style="color: var(--badge-medium);">0</div>
                    <div class="stat-lbl">Средние</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="stat-advanced" style="color: var(--badge-advanced);">0</div>
                    <div class="stat-lbl">Продвинутые</div>
                </div>
            </div>
        </header>

        <div id="content-container"></div>
    </main>

    <script src="terms-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
